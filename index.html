<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Mis horas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&family=Fraunces:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap');

  :root{
    --bg:#FFFAF0;
    --surface:#FFFFFF;
    --surface-2:#F6EAD4;
    --line:#E7DBC2;
    --primary:#0C5E8A;
    --primary-deep:#093f5c;
    --secondary:#5D9CBD;
    --green:#798C5E;
    --green-text:#54603c;
    --tan:#DAC297;
    --tan-text:#8a6a2e;
    --red:#c1694b;
    --text:#2b3138;
    --muted:#7c7566;
    --muted-2:#a89f8c;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; background:var(--bg); }
  body{
    font-family:'Inter', system-ui, sans-serif;
    color:var(--text);
    min-height:100%;
  }

  .app{
    max-width:460px;
    margin:0 auto;
    padding:20px 16px 40px;
  }

  /* ---------- Header ---------- */
  .brand{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:4px;
  }
  .brand h1{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:600;
    font-size:23px;
    letter-spacing:-0.01em;
    margin:0;
    color:var(--primary-deep);
  }
  .brand .clock{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .brand-right{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .gear-btn{
    width:30px; height:30px;
    border-radius:9px;
    background:var(--surface);
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color:var(--muted);
    font-size:15px;
    flex-shrink:0;
  }
  .gear-btn:active{ background:var(--surface-2); }

  .weeknav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:0 1px 2px rgba(43,49,56,0.03), 0 6px 18px rgba(43,49,56,0.05);
    border-radius:14px;
    padding:8px 10px;
    margin:16px 0 18px;
  }
  .weeknav button{
    background:var(--surface-2);
    border:1px solid var(--line);
    color:var(--text);
    width:34px;height:34px;
    border-radius:9px;
    font-size:16px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .weeknav button:active{ background:var(--line); }
  .weeknav .label{
    text-align:center;
    flex:1;
  }
  .weeknav .label .tag{
    font-size:10px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted-2);
    display:block;
    margin-bottom:2px;
  }
  .weeknav .label .range{
    font-size:13px;
    font-weight:600;
    color:var(--text);
  }
  .weeknav .today-btn{
    width:auto;
    padding:0 10px;
    font-size:11px;
    font-weight:600;
    color:var(--primary);
    background:transparent;
    border:none;
  }

  /* ---------- Today punch card ---------- */
  .ticket{
    position:relative;
    background:radial-gradient(120% 140% at 0% 0%, #FFFFFF 0%, var(--surface-2) 70%);
    border:1px solid var(--line);
    box-shadow:0 1px 2px rgba(43,49,56,0.03), 0 10px 28px rgba(43,49,56,0.06);
    border-radius:22px;
    padding:22px 20px 20px;
    overflow:hidden;
    margin-bottom:16px;
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    width:22px;height:22px;
    background:var(--bg);
    border-radius:50%;
    top:50%;
    transform:translateY(-50%);
  }
  .ticket::before{ left:-11px; }
  .ticket::after{ right:-11px; }

  .ticket .day-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:14px;
  }
  .ticket .day-name{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:600;
    font-size:24px;
    letter-spacing:-0.01em;
    color:var(--primary-deep);
  }
  .ticket .day-sub{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }
  .ticket .status-pill{
    font-size:10px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:5px 10px;
    border-radius:100px;
    white-space:nowrap;
  }
  .status-pending{ background:rgba(218,194,151,0.4); color:var(--tan-text); }
  .status-open{ background:rgba(121,140,94,0.16); color:var(--green-text); }
  .status-done{ background:rgba(93,156,189,0.16); color:var(--primary); }

  .punch-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:14px;
  }
  .punch-btn{
    border:none;
    border-radius:16px;
    padding:17px 10px;
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.01em;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    transition:transform .08s ease, filter .15s ease;
  }
  .punch-btn:active{ transform:scale(0.97); }
  .punch-btn .sub{
    font-family:'JetBrains Mono', monospace;
    font-weight:500;
    font-size:11px;
    opacity:0.85;
  }
  .btn-in{ background:linear-gradient(180deg, var(--primary), var(--primary-deep)); color:#FFFFFF; box-shadow:0 6px 16px rgba(12,94,138,0.25); }
  .btn-out{ background:#FFFFFF; color:var(--text); border:1.5px solid var(--secondary); }
  .punch-btn:disabled{ opacity:0.35; cursor:not-allowed; transform:none; filter:none; }

  .stamp{
    position:absolute;
    top:16px; right:16px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    font-weight:700;
    color:var(--primary);
    border:1.5px solid var(--primary);
    border-radius:6px;
    padding:3px 6px;
    letter-spacing:0.06em;
    transform:rotate(8deg) scale(0);
    opacity:0;
    pointer-events:none;
  }
  @keyframes stampIn{
    0%{ transform:rotate(8deg) scale(2); opacity:0; }
    55%{ transform:rotate(8deg) scale(0.92); opacity:1; }
    75%{ transform:rotate(8deg) scale(1.06); }
    100%{ transform:rotate(8deg) scale(1); opacity:1; }
  }
  .stamp.show{ animation:stampIn .5s ease-out forwards; }

  .manual-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .manual-field{
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:8px 10px;
  }
  .manual-field label{
    display:block;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted-2);
    margin-bottom:3px;
  }
  .manual-field input[type="time"]{
    width:100%;
    background:transparent;
    border:none;
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
    font-weight:600;
    padding:0;
  }
  .manual-field input[type="time"]::-webkit-calendar-picker-indicator{
    filter:opacity(0.6);
  }

  .pace-msg{
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:11px 13px;
    font-size:12.5px;
    color:var(--text);
    line-height:1.45;
    margin-bottom:14px;
  }
  .pace-msg strong{ color:var(--primary); }
  .pace-msg.good{ background:rgba(121,140,94,0.14); border-color:rgba(121,140,94,0.35); color:var(--green-text); }
  .pace-msg.good strong{ color:var(--green-text); }
  .pace-msg.off{ background:rgba(218,194,151,0.3); border-color:rgba(218,194,151,0.6); color:var(--tan-text); }
  .pace-msg.off strong{ color:var(--tan-text); }

  /* ---------- Progress ---------- */
  .progress-card{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:0 1px 2px rgba(43,49,56,0.03), 0 10px 28px rgba(43,49,56,0.06);
    border-radius:20px;
    padding:20px;
    margin-bottom:16px;
  }
  .progress-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:12px;
  }
  .progress-top .big{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:32px;
    color:var(--primary-deep);
  }
  .progress-top .big span{
    font-family:'Inter', sans-serif;
    font-size:14px;
    color:var(--muted);
    font-weight:500;
  }
  .progress-msg{
    font-size:12px;
    color:var(--muted);
    text-align:right;
  }
  .progress-msg strong{ color:var(--primary); font-weight:700; }
  .progress-msg.done strong{ color:var(--green-text); }

  .bar-track{
    height:10px;
    background:var(--surface-2);
    border-radius:100px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .bar-fill{
    height:100%;
    border-radius:100px;
    background:linear-gradient(90deg, var(--primary-deep), var(--primary));
    transition:width .4s ease;
  }
  .bar-fill.done{ background:linear-gradient(90deg, #4c5a37, var(--green)); }

  /* ---------- Week list ---------- */
  .week-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .week-list h2{
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--muted-2);
    margin:0 0 8px 4px;
    font-weight:700;
  }
  .day-row-compact{
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:0 1px 2px rgba(43,49,56,0.03), 0 4px 12px rgba(43,49,56,0.04);
    border-radius:16px;
    padding:13px 15px;
  }
  .day-row-compact.today{ border-color:rgba(12,94,138,0.4); }
  .day-row-compact.optional-off{ opacity:0.68; }

  .drow-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:9px;
  }
  .day-row-compact .dname{
    font-size:13px;
    font-weight:700;
    white-space:nowrap;
  }
  .day-row-compact .dname small{
    display:inline-block;
    margin-left:5px;
    font-size:10px;
    color:var(--muted-2);
    font-weight:500;
  }
  .turno-toggle{
    display:flex;
    align-items:center;
    gap:5px;
    font-size:11px;
    font-weight:600;
    color:var(--muted);
    flex:1;
    justify-content:flex-end;
    margin-right:4px;
  }
  .turno-toggle input{
    width:15px; height:15px;
    accent-color:var(--green);
  }
  .day-row-compact .dur{
    text-align:right;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    font-weight:700;
    color:var(--muted);
    white-space:nowrap;
  }
  .day-row-compact .dur.has{ color:var(--primary); }

  .drow-fields{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .day-row-compact .field{
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .day-row-compact .field label{
    font-size:9px;
    color:var(--muted-2);
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin-bottom:2px;
  }
  .day-row-compact input[type="time"]{
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    padding:6px 7px;
    width:100%;
    min-width:0;
  }
  .day-row-compact input[type="time"]::-webkit-calendar-picker-indicator{
    filter:opacity(0.6);
  }
  .turno-caption{
    margin-top:8px;
    font-size:10.5px;
    line-height:1.4;
    color:var(--muted-2);
  }

  .footer-note{
    text-align:center;
    font-size:11px;
    color:var(--muted-2);
    margin-top:18px;
    line-height:1.6;
  }

  .loading{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-size:13px;
  }

  /* ---------- Settings modal ---------- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(43,49,56,0.42);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
    padding:0;
  }
  .modal-card{
    background:var(--bg);
    width:100%;
    max-width:460px;
    max-height:88vh;
    overflow-y:auto;
    border-radius:22px 22px 0 0;
    padding:22px 20px 28px;
    box-shadow:0 -8px 30px rgba(43,49,56,0.15);
  }
  .modal-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .modal-head h2{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:600;
    font-size:20px;
    color:var(--primary-deep);
    margin:0;
  }
  .modal-close{
    width:30px; height:30px;
    border-radius:9px;
    background:var(--surface-2);
    border:1px solid var(--line);
    color:var(--text);
    font-size:15px;
    cursor:pointer;
  }
  .settings-block{
    margin-bottom:20px;
  }
  .settings-block label.block-label{
    display:block;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted-2);
    font-weight:700;
    margin-bottom:8px;
  }
  .settings-block input[type="number"],
  .settings-block input[type="time"],
  .settings-block select{
    width:100%;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:12px;
    padding:11px 12px;
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
    color:var(--text);
  }
  .day-checks{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .day-check{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:100px;
    padding:7px 12px 7px 10px;
    font-size:12.5px;
    font-weight:600;
    color:var(--text);
  }
  .day-check input{
    width:14px; height:14px;
    accent-color:var(--primary);
  }
  .settings-hint{
    font-size:11.5px;
    color:var(--muted);
    line-height:1.5;
    margin-top:8px;
  }
  .export-btn{
    width:100%;
    background:var(--primary);
    color:#FFFFFF;
    border:none;
    border-radius:14px;
    padding:14px;
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .export-btn:active{ filter:brightness(0.92); }
  .save-btn{
    width:100%;
    background:var(--green);
    color:#FFFFFF;
    border:none;
    border-radius:14px;
    padding:14px;
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    margin-top:6px;
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading" id="loading">Preparando tu registro…</div>
</div>

<script>
const ALL_DAYS = [
  { key:'mon', label:'Lunes',     short:'Lun', offset:0 },
  { key:'tue', label:'Martes',    short:'Mar', offset:1 },
  { key:'wed', label:'Miércoles', short:'Mié', offset:2 },
  { key:'thu', label:'Jueves',    short:'Jue', offset:3 },
  { key:'fri', label:'Viernes',   short:'Vie', offset:4 },
  { key:'sat', label:'Sábado',    short:'Sáb', offset:5 },
  { key:'sun', label:'Domingo',   short:'Dom', offset:6 },
];
const STORAGE_KEY = 'weeks';
const SETTINGS_KEY = 'settings';
const DEFAULT_SETTINGS = { goalHours:22, turnoDay:'thu', activeDays:['mon','tue','wed','thu','fri'], standardIn:'08:00', standardOut:'13:30' };

let settings = { ...DEFAULT_SETTINGS };
let DAYS = ALL_DAYS.filter(d => settings.activeDays.includes(d.key));

function goalMin(){ return Math.round(settings.goalHours * 60); }
function standardDayMinutes(){
  const a = minutesFromHM(settings.standardIn);
  const b = minutesFromHM(settings.standardOut);
  if(a == null || b == null) return null;
  const diff = b - a;
  return diff > 0 ? diff : null;
}

let weeks = {};          // { 'YYYY-MM-DD': { mon:{in,out}, ... } }
let viewingMonday = mondayOf(new Date());
const todayMonday = mondayOf(new Date());
let settingsOpen = false;

function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function mondayOf(date){
  const d = new Date(date);
  const day = d.getDay(); // 0 sun .. 6 sat
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
function addDays(date, n){ const d = new Date(date); d.setDate(d.getDate()+n); return d; }
function weekKey(mondayDate){ return fmtDate(mondayDate); }
function nowHM(){ const d = new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function minutesFromHM(hm){
  if(!hm) return null;
  const [h,m] = hm.split(':').map(Number);
  return h*60+m;
}
function durationLabel(mins){
  if(mins == null) return '—';
  const h = Math.floor(mins/60), m = mins%60;
  return h+'h '+pad(m)+'m';
}
function longDurationLabel(mins){
  const h = Math.floor(Math.abs(mins)/60), m = Math.abs(mins)%60;
  return h+' h '+m+' min';
}
function dayNameEs(date){
  return date.toLocaleDateString('es-ES', { day:'numeric', month:'short' });
}

function getWeekData(mondayDate){
  const k = weekKey(mondayDate);
  if(!weeks[k]){
    weeks[k] = { turnoJueves:true };
    DAYS.forEach(d => weeks[k][d.key] = { in:null, out:null });
  }
  DAYS.forEach(d => { if(!weeks[k][d.key]) weeks[k][d.key] = { in:null, out:null }; });
  if(typeof weeks[k].turnoJueves !== 'boolean') weeks[k].turnoJueves = true;
  return weeks[k];
}

// Un día cuenta para la meta, salvo el día de turno configurado cuando está marcado
// (turno = trabajo extra que no forma parte de las horas obligatorias).
function countsTowardGoal(wk, dayKey){
  return dayKey !== settings.turnoDay || !wk.turnoJueves;
}
function requiredDayKeys(wk){
  return DAYS.filter(d => countsTowardGoal(wk, d.key)).map(d => d.key);
}

// Calcula si hoy podés salir antes/después según lo ya trabajado esta semana.
// Cada día requerido tiene un objetivo fijo (meta ÷ días requeridos). Si venís
// adelantado, ese adelanto se descuenta completo del día de hoy (no se reparte
// entre los días que quedan) — así "si salís después un día, salís antes el próximo".
function computePaceMessage(wk, activeKey){
  const reqKeys = requiredDayKeys(wk);
  if(!activeKey || !reqKeys.includes(activeKey)) return null;

  const entryToday = wk[activeKey];
  if(entryToday.in && entryToday.out) return null; // el día ya está cerrado, nada que sugerir

  const activeObj = DAYS.find(d => d.key === activeKey);
  const GOAL = goalMin();
  // El objetivo por día es tu horario habitual (fijo), no la meta repartida entre
  // los días que cuenten esta semana en particular — así el cálculo no cambia según
  // si tildás o destildás el turno.
  const perDayFixed = standardDayMinutes() || (GOAL / reqKeys.length);

  // Minutos trabajados y cantidad de días requeridos que ya pasaron (antes de hoy)
  let workedBeforeToday = 0;
  let requiredDaysBeforeToday = 0;
  reqKeys.forEach(k => {
    const dObj = DAYS.find(x => x.key === k);
    if(dObj.offset < activeObj.offset){
      requiredDaysBeforeToday++;
      const m = computeDayMinutes(wk[k]);
      if(m) workedBeforeToday += m;
    }
  });

  if(workedBeforeToday >= GOAL){
    return { type:'good', text:'¡Ya cumpliste tu meta semanal! Hoy puedes salir cuando quieras 🎉' };
  }

  const expectedByNow = perDayFixed * requiredDaysBeforeToday;
  const balance = workedBeforeToday - expectedByNow; // + = adelantado, - = atrasado
  const neededToday = Math.max(perDayFixed - balance, 0);

  if(entryToday.in){
    const inM = minutesFromHM(entryToday.in);
    const targetM = Math.round(inM + neededToday);
    const hh = Math.floor((targetM % 1440) / 60), mm = Math.round(targetM % 60);
    return { type:'info', text:`Al ritmo actual, hoy te alcanza con salir a las <strong>${pad(hh)}:${pad(mm)}</strong>.` };
  }

  const h = Math.floor(neededToday/60), m = Math.round(neededToday%60);
  return { type:'info', text:`Hoy tienes que cubrir cerca de <strong>${h}h ${pad(m)}m</strong> para ir al día.` };
}

async function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) weeks = JSON.parse(raw);
  }catch(e){
    weeks = {};
  }
  try{
    const rawSettings = localStorage.getItem(SETTINGS_KEY);
    if(rawSettings){
      const parsed = JSON.parse(rawSettings);
      settings = { ...DEFAULT_SETTINGS, ...parsed };
      if(!Array.isArray(settings.activeDays) || settings.activeDays.length === 0){
        settings.activeDays = DEFAULT_SETTINGS.activeDays;
      }
    }
  }catch(e){
    settings = { ...DEFAULT_SETTINGS };
  }
  DAYS = ALL_DAYS.filter(d => settings.activeDays.includes(d.key));
}
async function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(weeks));
  }catch(e){
    console.error('No se pudo guardar', e);
  }
}
async function saveSettings(){
  try{
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  }catch(e){
    console.error('No se pudo guardar la configuración', e);
  }
  DAYS = ALL_DAYS.filter(d => settings.activeDays.includes(d.key));
}

function todayKeyIfCurrentWeek(){
  if(weekKey(viewingMonday) !== weekKey(todayMonday)) return null;
  const jsDay = new Date().getDay(); // 0..6, 0=domingo
  const map = {0:'sun',1:'mon',2:'tue',3:'wed',4:'thu',5:'fri',6:'sat'};
  const key = map[jsDay];
  return DAYS.some(d => d.key === key) ? key : null;
}

function computeDayMinutes(entry){
  const inM = minutesFromHM(entry.in);
  const outM = minutesFromHM(entry.out);
  if(inM == null || outM == null) return null;
  const diff = outM - inM;
  return diff > 0 ? diff : null;
}

function render(){
  const wk = getWeekData(viewingMonday);
  const isCurrentWeek = weekKey(viewingMonday) === weekKey(todayMonday);
  const activeKey = todayKeyIfCurrentWeek();
  const activeDay = DAYS.find(d => d.key === activeKey);

  let totalMin = 0;
  DAYS.forEach(d => {
    if(!countsTowardGoal(wk, d.key)) return;
    const m = computeDayMinutes(wk[d.key]);
    if(m) totalMin += m;
  });
  const GOAL = goalMin();
  const remaining = GOAL - totalMin;
  const pct = Math.min(100, Math.round((totalMin/GOAL)*100));

  const maxOffset = DAYS.length ? Math.max(...DAYS.map(d => d.offset)) : 0;
  const rangeStart = viewingMonday;
  const rangeEnd = addDays(viewingMonday, maxOffset);
  const rangeLabel = dayNameEs(rangeStart) + ' – ' + dayNameEs(rangeEnd);

  let html = '';

  html += `
  <div class="brand">
    <h1>Mis horas</h1>
    <div class="brand-right">
      <div class="clock" id="liveClock">--:--:--</div>
      <button class="gear-btn" id="openSettings" aria-label="Configuración">⚙</button>
    </div>
  </div>

  <div class="weeknav">
    <button id="prevWeek" aria-label="Semana anterior">‹</button>
    <div class="label">
      <span class="tag">${isCurrentWeek ? 'Semana actual' : 'Semana'}</span>
      <span class="range">${rangeLabel}</span>
    </div>
    ${isCurrentWeek ? '<div style="width:34px"></div>' : '<button class="today-btn" id="goToday">Hoy</button>'}
    <button id="nextWeek" aria-label="Semana siguiente">›</button>
  </div>
  `;

  // Ticket (punch card) — only meaningful for current week & a real weekday
  if(isCurrentWeek && activeDay){
    const entry = wk[activeDay.key];
    const hasIn = !!entry.in;
    const hasOut = !!entry.out;
    let statusHtml, statusClass;
    if(!hasIn){ statusHtml = 'Sin marcar'; statusClass='status-pending'; }
    else if(hasIn && !hasOut){ statusHtml = 'En curso'; statusClass='status-open'; }
    else { statusHtml = 'Jornada cerrada'; statusClass='status-done'; }

    const isTurnoToday = activeDay.key === settings.turnoDay && wk.turnoJueves;
    let paceHtml = '';
    if(isTurnoToday){
      paceHtml = `<div class="pace-msg off">Hoy tienes <strong>turno</strong>: no cuenta para tu meta, es horas extra.</div>`;
    } else {
      const pace = computePaceMessage(wk, activeDay.key);
      if(pace) paceHtml = `<div class="pace-msg ${pace.type}">${pace.text}</div>`;
    }

    html += `
    <div class="ticket">
      <div class="stamp" id="stampFx">MARCADO ✓</div>
      <div class="day-row">
        <div>
          <div class="day-name">${activeDay.label}</div>
          <div class="day-sub">${dayNameEs(new Date())}</div>
        </div>
        <div class="status-pill ${statusClass}">${statusHtml}</div>
      </div>

      ${paceHtml}

      <div class="punch-grid">
        <button class="punch-btn btn-in" id="btnIn" ${hasIn ? 'disabled' : ''}>
          Llegué
          <span class="sub">${hasIn ? entry.in : 'toco y guardo la hora'}</span>
        </button>
        <button class="punch-btn btn-out" id="btnOut" ${(!hasIn || hasOut) ? 'disabled' : ''}>
          Me fui
          <span class="sub">${hasOut ? entry.out : 'toco y guardo la hora'}</span>
        </button>
      </div>

      <div class="manual-row">
        <div class="manual-field">
          <label>Entrada (manual)</label>
          <input type="time" id="manualIn" value="${entry.in || ''}">
        </div>
        <div class="manual-field">
          <label>Salida (manual)</label>
          <input type="time" id="manualOut" value="${entry.out || ''}">
        </div>
      </div>
    </div>
    `;
  } else if(!isCurrentWeek){
    html += `
    <div class="ticket" style="text-align:center; padding:22px 16px;">
      <div style="font-size:13px;color:var(--muted);">Estás viendo una semana distinta a la actual.<br>Volvé a "Hoy" para marcar entrada/salida.</div>
    </div>
    `;
  }

  // Progress
  const doneClass = remaining <= 0 ? 'done' : '';
  html += `
  <div class="progress-card">
    <div class="progress-top">
      <div class="big">${(totalMin/60).toFixed(1)}<span> / ${settings.goalHours} h</span></div>
      <div class="progress-msg ${doneClass}">
        ${remaining <= 0
          ? `¡Meta cumplida! <strong>+${longDurationLabel(remaining)}</strong>`
          : `Te faltan <strong>${longDurationLabel(remaining)}</strong>`}
      </div>
    </div>
    <div class="bar-track"><div class="bar-fill ${doneClass}" style="width:${pct}%"></div></div>
  </div>
  `;

  // Week list
  html += `<div class="week-list"><h2>Detalle de la semana</h2>`;
  DAYS.forEach(d => {
    const entry = wk[d.key];
    const mins = computeDayMinutes(entry);
    const isToday = isCurrentWeek && d.key === activeKey;
    const dateForDay = addDays(viewingMonday, d.offset);
    const isTurnoDay = d.key === settings.turnoDay;
    const isOff = isTurnoDay && wk.turnoJueves;
    const durText = durationLabel(mins);

    const turnoToggle = isTurnoDay
      ? `<label class="turno-toggle"><input type="checkbox" id="turnoJuevesToggle" ${wk.turnoJueves ? 'checked' : ''}> Turno</label>`
      : '';
    const turnoCaption = isTurnoDay
      ? `<div class="turno-caption">${wk.turnoJueves ? `Con turno marcado, ${d.label.toLowerCase()} no cuenta para tu meta — es extra.` : `Sin turno: ${d.label.toLowerCase()} cuenta como un día más para tu meta.`}</div>`
      : '';

    html += `
    <div class="day-row-compact ${isToday ? 'today' : ''} ${isOff ? 'optional-off' : ''}">
      <div class="drow-top">
        <div class="dname">${d.short}<small>${dayNameEs(dateForDay)}</small></div>
        ${turnoToggle}
        <div class="dur ${mins ? 'has' : ''}">${durText}</div>
      </div>
      <div class="drow-fields">
        <div class="field">
          <label>Entrada</label>
          <input type="time" data-day="${d.key}" data-field="in" value="${entry.in || ''}">
        </div>
        <div class="field">
          <label>Salida</label>
          <input type="time" data-day="${d.key}" data-field="out" value="${entry.out || ''}">
        </div>
      </div>
      ${turnoCaption}
    </div>
    `;
  });
  html += `</div>`;

  html += `<div class="footer-note">Tus horas se guardan solas en este dispositivo.<br>Tocá "Llegué" o "Me fui" para registrar la hora actual, o editá cualquier campo a mano.</div>`;

  if(settingsOpen){
    html += renderSettingsModal();
  }

  document.getElementById('app').innerHTML = html;
  attachEvents();
}

function renderSettingsModal(){
  const dayChecks = ALL_DAYS.map(d => `
    <label class="day-check">
      <input type="checkbox" class="active-day-check" value="${d.key}" ${settings.activeDays.includes(d.key) ? 'checked' : ''}>
      ${d.short}
    </label>
  `).join('');

  const turnoOptions = ALL_DAYS.map(d => `<option value="${d.key}" ${settings.turnoDay === d.key ? 'selected' : ''}>${d.label}</option>`).join('');

  return `
  <div class="modal-overlay" id="settingsOverlay">
    <div class="modal-card">
      <div class="modal-head">
        <h2>Configuración</h2>
        <button class="modal-close" id="closeSettings">✕</button>
      </div>

      <div class="settings-block">
        <label class="block-label">Meta semanal (horas)</label>
        <input type="number" id="goalHoursInput" value="${settings.goalHours}" min="1" max="80" step="0.5">
      </div>

      <div class="settings-block">
        <label class="block-label">Horario tipo</label>
        <div class="day-checks" style="gap:10px;">
          <div style="flex:1; min-width:120px;">
            <div class="settings-hint" style="margin:0 0 4px;">Entrada habitual</div>
            <input type="time" id="standardInInput" value="${settings.standardIn}">
          </div>
          <div style="flex:1; min-width:120px;">
            <div class="settings-hint" style="margin:0 0 4px;">Salida habitual</div>
            <input type="time" id="standardOutInput" value="${settings.standardOut}">
          </div>
        </div>
        <div class="settings-hint">Es el objetivo fijo de cada día para calcular a qué hora podés salir — no cambia aunque tildes o destildes el turno.</div>
      </div>

      <div class="settings-block">
        <label class="block-label">Días que usás</label>
        <div class="day-checks">${dayChecks}</div>
        <div class="settings-hint">Tildá los días que querés ver en tu semana.</div>
      </div>

      <div class="settings-block">
        <label class="block-label">Día de turno (no cuenta para la meta)</label>
        <select id="turnoDaySelect">${turnoOptions}</select>
        <div class="settings-hint">Ese día vas a poder tildar "Turno" para que las horas trabajadas ahí no sumen a tu meta semanal — quedan como extra.</div>
      </div>

      <div class="settings-block">
        <label class="block-label">Historial completo</label>
        <button class="export-btn" id="exportCsvBtn">⬇ Descargar histórico (.csv)</button>
        <div class="settings-hint">Se abre directamente en Excel o Google Sheets, con todas las semanas guardadas.</div>
      </div>

      <button class="save-btn" id="saveSettingsBtn">Guardar</button>
    </div>
  </div>
  `;
}

function attachEvents(){
  const prevBtn = document.getElementById('prevWeek');
  const nextBtn = document.getElementById('nextWeek');
  const todayBtn = document.getElementById('goToday');
  if(prevBtn) prevBtn.onclick = () => { viewingMonday = addDays(viewingMonday, -7); render(); };
  if(nextBtn) nextBtn.onclick = () => { viewingMonday = addDays(viewingMonday, 7); render(); };
  if(todayBtn) todayBtn.onclick = () => { viewingMonday = mondayOf(new Date()); render(); };

  const btnIn = document.getElementById('btnIn');
  const btnOut = document.getElementById('btnOut');
  if(btnIn) btnIn.onclick = async () => {
    const activeKey = todayKeyIfCurrentWeek();
    if(!activeKey) return;
    const wk = getWeekData(viewingMonday);
    wk[activeKey].in = nowHM();
    await saveData();
    render();
    fireStamp();
  };
  if(btnOut) btnOut.onclick = async () => {
    const activeKey = todayKeyIfCurrentWeek();
    if(!activeKey) return;
    const wk = getWeekData(viewingMonday);
    wk[activeKey].out = nowHM();
    await saveData();
    render();
    fireStamp();
  };

  const manualIn = document.getElementById('manualIn');
  const manualOut = document.getElementById('manualOut');
  if(manualIn) manualIn.onchange = async (e) => {
    const activeKey = todayKeyIfCurrentWeek();
    const wk = getWeekData(viewingMonday);
    wk[activeKey].in = e.target.value || null;
    await saveData();
    render();
  };
  if(manualOut) manualOut.onchange = async (e) => {
    const activeKey = todayKeyIfCurrentWeek();
    const wk = getWeekData(viewingMonday);
    wk[activeKey].out = e.target.value || null;
    await saveData();
    render();
  };

  const turnoToggle = document.getElementById('turnoJuevesToggle');
  if(turnoToggle) turnoToggle.onchange = async (e) => {
    const wk = getWeekData(viewingMonday);
    wk.turnoJueves = e.target.checked;
    await saveData();
    render();
  };

  document.querySelectorAll('.day-row-compact input[type="time"]').forEach(inp => {
    inp.onchange = async (e) => {
      const day = e.target.getAttribute('data-day');
      const field = e.target.getAttribute('data-field');
      const wk = getWeekData(viewingMonday);
      wk[day][field] = e.target.value || null;
      await saveData();
      render();
    };
  });

  const openSettingsBtn = document.getElementById('openSettings');
  if(openSettingsBtn) openSettingsBtn.onclick = () => { settingsOpen = true; render(); };

  const closeSettingsBtn = document.getElementById('closeSettings');
  if(closeSettingsBtn) closeSettingsBtn.onclick = () => { settingsOpen = false; render(); };

  const overlay = document.getElementById('settingsOverlay');
  if(overlay) overlay.addEventListener('click', (e) => {
    if(e.target === overlay){ settingsOpen = false; render(); }
  });

  const saveSettingsBtn = document.getElementById('saveSettingsBtn');
  if(saveSettingsBtn) saveSettingsBtn.onclick = async () => {
    const goalInput = document.getElementById('goalHoursInput');
    const turnoSelect = document.getElementById('turnoDaySelect');
    const checks = document.querySelectorAll('.active-day-check:checked');

    const newGoal = parseFloat(goalInput.value);
    settings.goalHours = (isFinite(newGoal) && newGoal > 0) ? newGoal : DEFAULT_SETTINGS.goalHours;
    settings.turnoDay = turnoSelect.value;

    const standardInInput = document.getElementById('standardInInput');
    const standardOutInput = document.getElementById('standardOutInput');
    settings.standardIn = standardInInput.value || DEFAULT_SETTINGS.standardIn;
    settings.standardOut = standardOutInput.value || DEFAULT_SETTINGS.standardOut;

    const newActiveDays = Array.from(checks).map(c => c.value);
    settings.activeDays = newActiveDays.length ? newActiveDays : DEFAULT_SETTINGS.activeDays;

    await saveSettings();
    settingsOpen = false;
    render();
  };

  const exportBtn = document.getElementById('exportCsvBtn');
  if(exportBtn) exportBtn.onclick = () => exportHistoryCsv();
}

function fireStamp(){
  const stamp = document.getElementById('stampFx');
  if(!stamp) return;
  stamp.classList.remove('show');
  void stamp.offsetWidth;
  stamp.classList.add('show');
}

function csvEscape(val){
  const s = String(val == null ? '' : val);
  if(/[",\n;]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function exportHistoryCsv(){
  const rows = [['Semana (lunes)', 'Día', 'Fecha', 'Entrada', 'Salida', 'Horas trabajadas', 'Cuenta para la meta', 'Turno marcado']];

  const sortedWeekKeys = Object.keys(weeks).sort();
  sortedWeekKeys.forEach(wkKey => {
    const wk = weeks[wkKey];
    const monday = new Date(wkKey + 'T00:00:00');
    ALL_DAYS.forEach(d => {
      const entry = wk[d.key];
      if(!entry || (!entry.in && !entry.out)) return; // no hay nada cargado ese día
      const mins = computeDayMinutes(entry);
      const dateForDay = addDays(monday, d.offset);
      const counts = countsTowardGoal(wk, d.key) ? 'Sí' : 'No';
      rows.push([
        wkKey,
        d.label,
        fmtDate(dateForDay),
        entry.in || '',
        entry.out || '',
        mins != null ? (mins/60).toFixed(2) : '',
        counts,
        (d.key === settings.turnoDay) ? (wk.turnoJueves ? 'Sí' : 'No') : ''
      ]);
    });
  });

  const csvContent = rows.map(r => r.map(csvEscape).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csvContent], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'mis-horas-historico.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function tickClock(){
  const el = document.getElementById('liveClock');
  if(!el) return;
  const d = new Date();
  el.textContent = pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
}

(async function init(){
  try{
    await loadData();
    render();
    tickClock();
    setInterval(tickClock, 1000);
  }catch(err){
    document.getElementById('app').innerHTML =
      '<div class="loading">Uy, algo falló al cargar.<br><br>' +
      '<span style="color:#c1694b; font-family:monospace; font-size:11px;">' +
      (err && err.message ? err.message : String(err)) +
      '</span></div>';
    console.error(err);
  }
})();
</script>
</body>
</html>
