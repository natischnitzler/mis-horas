<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>22 horas semanales</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --ink:#11141b;
    --surface:#1a1f29;
    --surface-2:#212836;
    --line:#2b3242;
    --amber:#e7a33e;
    --amber-deep:#c98a2e;
    --green:#5fb88f;
    --red:#e2735a;
    --text:#f3f1ec;
    --muted:#8d93a3;
    --muted-2:#5b6270;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; background:transparent; }
  body{
    font-family:'Inter', system-ui, sans-serif;
    color:var(--text);
    min-height:100%;
  }

  .app{
    max-width:460px;
    margin:0 auto;
    padding:20px 16px 40px;
  }

  /* ---------- Header ---------- */
  .brand{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:4px;
  }
  .brand h1{
    font-size:20px;
    font-weight:800;
    letter-spacing:-0.02em;
    margin:0;
  }
  .brand .clock{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .weeknav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:8px 10px;
    margin:14px 0 18px;
  }
  .weeknav button{
    background:var(--surface-2);
    border:1px solid var(--line);
    color:var(--text);
    width:34px;height:34px;
    border-radius:9px;
    font-size:16px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .weeknav button:active{ background:var(--line); }
  .weeknav .label{
    text-align:center;
    flex:1;
  }
  .weeknav .label .tag{
    font-size:10px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted-2);
    display:block;
    margin-bottom:2px;
  }
  .weeknav .label .range{
    font-size:13px;
    font-weight:600;
    color:var(--text);
  }
  .weeknav .today-btn{
    width:auto;
    padding:0 10px;
    font-size:11px;
    font-weight:600;
    color:var(--amber);
    background:transparent;
    border:none;
  }

  /* ---------- Today punch card ---------- */
  .ticket{
    position:relative;
    background:radial-gradient(120% 140% at 0% 0%, #202737 0%, #171b24 70%);
    border:1px solid var(--line);
    border-radius:20px;
    padding:20px 18px 18px;
    overflow:hidden;
    margin-bottom:16px;
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    width:22px;height:22px;
    background:#0d1015;
    border-radius:50%;
    top:50%;
    transform:translateY(-50%);
  }
  .ticket::before{ left:-11px; }
  .ticket::after{ right:-11px; }

  .ticket .day-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:14px;
  }
  .ticket .day-name{
    font-size:19px;
    font-weight:800;
    letter-spacing:-0.01em;
  }
  .ticket .day-sub{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }
  .ticket .status-pill{
    font-size:10px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:5px 10px;
    border-radius:100px;
    white-space:nowrap;
  }
  .status-pending{ background:rgba(231,163,62,0.15); color:var(--amber); }
  .status-open{ background:rgba(95,184,143,0.15); color:var(--green); }
  .status-done{ background:rgba(141,147,163,0.15); color:var(--muted); }

  .punch-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:14px;
  }
  .punch-btn{
    border:none;
    border-radius:14px;
    padding:16px 10px;
    font-family:'Inter', sans-serif;
    font-weight:800;
    font-size:14px;
    letter-spacing:0.02em;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    transition:transform .08s ease, filter .15s ease;
  }
  .punch-btn:active{ transform:scale(0.97); }
  .punch-btn .sub{
    font-family:'JetBrains Mono', monospace;
    font-weight:500;
    font-size:11px;
    opacity:0.85;
  }
  .btn-in{ background:linear-gradient(180deg, var(--amber), var(--amber-deep)); color:#221604; }
  .btn-out{ background:var(--surface-2); color:var(--text); border:1px solid var(--line); }
  .punch-btn:disabled{ opacity:0.35; cursor:not-allowed; transform:none; filter:none; }

  .stamp{
    position:absolute;
    top:16px; right:16px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    font-weight:700;
    color:var(--amber);
    border:1.5px solid var(--amber);
    border-radius:6px;
    padding:3px 6px;
    letter-spacing:0.06em;
    transform:rotate(8deg) scale(0);
    opacity:0;
    pointer-events:none;
  }
  @keyframes stampIn{
    0%{ transform:rotate(8deg) scale(2); opacity:0; }
    55%{ transform:rotate(8deg) scale(0.92); opacity:1; }
    75%{ transform:rotate(8deg) scale(1.06); }
    100%{ transform:rotate(8deg) scale(1); opacity:1; }
  }
  .stamp.show{ animation:stampIn .5s ease-out forwards; }

  .manual-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .manual-field{
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:8px 10px;
  }
  .manual-field label{
    display:block;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted-2);
    margin-bottom:3px;
  }
  .manual-field input[type="time"]{
    width:100%;
    background:transparent;
    border:none;
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
    font-weight:600;
    padding:0;
  }
  .manual-field input[type="time"]::-webkit-calendar-picker-indicator{
    filter:invert(1) opacity(0.6);
  }

  /* ---------- Progress ---------- */
  .progress-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px;
    margin-bottom:16px;
  }
  .progress-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:10px;
  }
  .progress-top .big{
    font-family:'JetBrains Mono', monospace;
    font-size:26px;
    font-weight:700;
    color:var(--text);
  }
  .progress-top .big span{
    font-size:14px;
    color:var(--muted);
    font-weight:500;
  }
  .progress-msg{
    font-size:12px;
    color:var(--muted);
    text-align:right;
  }
  .progress-msg strong{ color:var(--amber); font-weight:700; }
  .progress-msg.done strong{ color:var(--green); }

  .bar-track{
    height:10px;
    background:var(--surface-2);
    border-radius:100px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .bar-fill{
    height:100%;
    border-radius:100px;
    background:linear-gradient(90deg, var(--amber-deep), var(--amber));
    transition:width .4s ease;
  }
  .bar-fill.done{ background:linear-gradient(90deg, #3f8f6c, var(--green)); }

  /* ---------- Week list ---------- */
  .week-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .week-list h2{
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--muted-2);
    margin:0 0 8px 4px;
    font-weight:700;
  }
  .day-row-compact{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 14px;
    display:grid;
    grid-template-columns:64px 1fr 1fr 60px;
    align-items:center;
    gap:8px;
  }
  .day-row-compact.today{ border-color:rgba(231,163,62,0.5); }
  .day-row-compact .dname{
    font-size:13px;
    font-weight:700;
  }
  .day-row-compact .dname small{
    display:block;
    font-size:10px;
    color:var(--muted-2);
    font-weight:500;
  }
  .day-row-compact .field{
    display:flex;
    flex-direction:column;
  }
  .day-row-compact .field label{
    font-size:9px;
    color:var(--muted-2);
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .day-row-compact input[type="time"]{
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    padding:5px 6px;
    width:100%;
  }
  .day-row-compact .dur{
    text-align:right;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    font-weight:700;
    color:var(--muted);
  }
  .day-row-compact .dur.has{ color:var(--text); }

  .footer-note{
    text-align:center;
    font-size:11px;
    color:var(--muted-2);
    margin-top:18px;
    line-height:1.6;
  }

  .loading{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-size:13px;
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading" id="loading">Preparando tu registro…</div>
</div>

<script>
const DAYS = [
  { key:'mon', label:'Lunes',     short:'Lun', offset:0 },
  { key:'tue', label:'Martes',    short:'Mar', offset:1 },
  { key:'wed', label:'Miércoles', short:'Mié', offset:2 },
  { key:'thu', label:'Jueves',    short:'Jue', offset:3 },
  { key:'fri', label:'Viernes',   short:'Vie', offset:4 },
];
const GOAL_MIN = 22 * 60;
const STORAGE_KEY = 'weeks';

let weeks = {};          // { 'YYYY-MM-DD': { mon:{in,out}, ... } }
let viewingMonday = mondayOf(new Date());
const todayMonday = mondayOf(new Date());

function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function mondayOf(date){
  const d = new Date(date);
  const day = d.getDay(); // 0 sun .. 6 sat
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
function addDays(date, n){ const d = new Date(date); d.setDate(d.getDate()+n); return d; }
function weekKey(mondayDate){ return fmtDate(mondayDate); }
function nowHM(){ const d = new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function minutesFromHM(hm){
  if(!hm) return null;
  const [h,m] = hm.split(':').map(Number);
  return h*60+m;
}
function durationLabel(mins){
  if(mins == null) return '—';
  const h = Math.floor(mins/60), m = mins%60;
  return h+'h '+pad(m)+'m';
}
function longDurationLabel(mins){
  const h = Math.floor(Math.abs(mins)/60), m = Math.abs(mins)%60;
  return h+' h '+m+' min';
}
function dayNameEs(date){
  return date.toLocaleDateString('es-ES', { day:'numeric', month:'short' });
}

function getWeekData(mondayDate){
  const k = weekKey(mondayDate);
  if(!weeks[k]){
    weeks[k] = {};
    DAYS.forEach(d => weeks[k][d.key] = { in:null, out:null });
  }
  DAYS.forEach(d => { if(!weeks[k][d.key]) weeks[k][d.key] = { in:null, out:null }; });
  return weeks[k];
}

function todayKeyIfCurrentWeek(){
  if(weekKey(viewingMonday) !== weekKey(todayMonday)) return null;
  const jsDay = new Date().getDay(); // 0..6
  const map = {1:'mon',2:'tue',3:'wed',4:'thu',5:'fri'};
  return map[jsDay] || null;
}

function computeDayMinutes(entry){
  const inM = minutesFromHM(entry.in);
  const outM = minutesFromHM(entry.out);
  if(inM == null || outM == null) return null;
  const diff = outM - inM;
  return diff > 0 ? diff : null;
}

function render(){
  const wk = getWeekData(viewingMonday);
  const isCurrentWeek = weekKey(viewingMonday) === weekKey(todayMonday);
  const activeKey = todayKeyIfCurrentWeek();
  const activeDay = DAYS.find(d => d.key === activeKey);

  let totalMin = 0;
  DAYS.forEach(d => {
    const m = computeDayMinutes(wk[d.key]);
    if(m) totalMin += m;
  });
  const remaining = GOAL_MIN - totalMin;
  const pct = Math.min(100, Math.round((totalMin/GOAL_MIN)*100));

  const rangeStart = viewingMonday;
  const rangeEnd = addDays(viewingMonday, 4);
  const rangeLabel = dayNameEs(rangeStart) + ' – ' + dayNameEs(rangeEnd);

  let html = '';

  html += `
  <div class="brand">
    <h1>22 horas semanales</h1>
    <div class="clock" id="liveClock">--:--:--</div>
  </div>

  <div class="weeknav">
    <button id="prevWeek" aria-label="Semana anterior">‹</button>
    <div class="label">
      <span class="tag">${isCurrentWeek ? 'Semana actual' : 'Semana'}</span>
      <span class="range">${rangeLabel}</span>
    </div>
    ${isCurrentWeek ? '<div style="width:34px"></div>' : '<button class="today-btn" id="goToday">Hoy</button>'}
    <button id="nextWeek" aria-label="Semana siguiente">›</button>
  </div>
  `;

  // Ticket (punch card) — only meaningful for current week & a real weekday
  if(isCurrentWeek && activeDay){
    const entry = wk[activeDay.key];
    const hasIn = !!entry.in;
    const hasOut = !!entry.out;
    let statusHtml, statusClass;
    if(!hasIn){ statusHtml = 'Sin marcar'; statusClass='status-pending'; }
    else if(hasIn && !hasOut){ statusHtml = 'En curso'; statusClass='status-open'; }
    else { statusHtml = 'Jornada cerrada'; statusClass='status-done'; }

    html += `
    <div class="ticket">
      <div class="stamp" id="stampFx">MARCADO ✓</div>
      <div class="day-row">
        <div>
          <div class="day-name">${activeDay.label}</div>
          <div class="day-sub">${dayNameEs(new Date())}</div>
        </div>
        <div class="status-pill ${statusClass}">${statusHtml}</div>
      </div>

      <div class="punch-grid">
        <button class="punch-btn btn-in" id="btnIn" ${hasIn ? 'disabled' : ''}>
          Llegué
          <span class="sub">${hasIn ? entry.in : 'toco y guardo la hora'}</span>
        </button>
        <button class="punch-btn btn-out" id="btnOut" ${(!hasIn || hasOut) ? 'disabled' : ''}>
          Me fui
          <span class="sub">${hasOut ? entry.out : 'toco y guardo la hora'}</span>
        </button>
      </div>

      <div class="manual-row">
        <div class="manual-field">
          <label>Entrada (manual)</label>
          <input type="time" id="manualIn" value="${entry.in || ''}">
        </div>
        <div class="manual-field">
          <label>Salida (manual)</label>
          <input type="time" id="manualOut" value="${entry.out || ''}">
        </div>
      </div>
    </div>
    `;
  } else if(!isCurrentWeek){
    html += `
    <div class="ticket" style="text-align:center; padding:22px 16px;">
      <div style="font-size:13px;color:var(--muted);">Estás viendo una semana distinta a la actual.<br>Volvé a "Hoy" para marcar entrada/salida.</div>
    </div>
    `;
  }

  // Progress
  const doneClass = remaining <= 0 ? 'done' : '';
  html += `
  <div class="progress-card">
    <div class="progress-top">
      <div class="big">${(totalMin/60).toFixed(1)}<span> / 22 h</span></div>
      <div class="progress-msg ${doneClass}">
        ${remaining <= 0
          ? `¡Meta cumplida! <strong>+${longDurationLabel(remaining)}</strong>`
          : `Te faltan <strong>${longDurationLabel(remaining)}</strong>`}
      </div>
    </div>
    <div class="bar-track"><div class="bar-fill ${doneClass}" style="width:${pct}%"></div></div>
  </div>
  `;

  // Week list
  html += `<div class="week-list"><h2>Detalle de la semana</h2>`;
  DAYS.forEach(d => {
    const entry = wk[d.key];
    const mins = computeDayMinutes(entry);
    const isToday = isCurrentWeek && d.key === activeKey;
    const dateForDay = addDays(viewingMonday, d.offset);
    html += `
    <div class="day-row-compact ${isToday ? 'today' : ''}">
      <div class="dname">${d.short}<small>${dayNameEs(dateForDay)}</small></div>
      <div class="field">
        <label>Entrada</label>
        <input type="time" data-day="${d.key}" data-field="in" value="${entry.in || ''}">
      </div>
      <div class="field">
        <label>Salida</label>
        <input type="time" data-day="${d.key}" data-field="out" value="${entry.out || ''}">
      </div>
      <div class="dur ${mins ? 'has' : ''}">${durationLabel(mins)}</div>
    </div>
    `;
  });
  html += `</div>`;

  html += `<div class="footer-note">Tus horas se guardan solas en este dispositivo.<br>Tocá "Llegué" o "Me fui" para registrar la hora actual, o editá cualquier campo a mano.</div>`;

  document.getElementById('app').innerHTML = html;
  attachEvents();
}

function attachEvents(){
  const prevBtn = document.getElementById('prevWeek');
  const nextBtn = document.getElementById('nextWeek');
  const todayBtn = document.getElementById('goToday');
  if(prevBtn) prevBtn.onclick = () => { viewingMonday = addDays(viewingMonday, -7); render(); };
  if(nextBtn) nextBtn.onclick = () => { viewingMonday = addDays(viewingMonday, 7); render(); };
  if(todayBtn) todayBtn.onclick = () => { viewingMonday = mondayOf(new Date()); render(); };

  const btnIn = document.getElementById('btnIn');
  const btnOut = document.getElementById('btnOut');
  if(btnIn) btnIn.onclick = async () => {
    const activeKey = todayKeyIfCurrentWeek();
    if(!activeKey) return;
    const wk = getWeekData(viewingMonday);
    wk[activeKey].in = nowHM();
    await saveData();
    render();
    fireStamp();
  };
  if(btnOut) btnOut.onclick = async () => {
    const activeKey = todayKeyIfCurrentWeek();
    if(!activeKey) return;
    const wk = getWeekData(viewingMonday);
    wk[activeKey].out = nowHM();
    await saveData();
    render();
    fireStamp();
  };

  const manualIn = document.getElementById('manualIn');
  const manualOut = document.getElementById('manualOut');
  if(manualIn) manualIn.onchange = async (e) => {
    const activeKey = todayKeyIfCurrentWeek();
    const wk = getWeekData(viewingMonday);
    wk[activeKey].in = e.target.value || null;
    await saveData();
    render();
  };
  if(manualOut) manualOut.onchange = async (e) => {
    const activeKey = todayKeyIfCurrentWeek();
    const wk = getWeekData(viewingMonday);
    wk[activeKey].out = e.target.value || null;
    await saveData();
    render();
  };

  document.querySelectorAll('.day-row-compact input[type="time"]').forEach(inp => {
    inp.onchange = async (e) => {
      const day = e.target.getAttribute('data-day');
      const field = e.target.getAttribute('data-field');
      const wk = getWeekData(viewingMonday);
      wk[day][field] = e.target.value || null;
      await saveData();
      render();
    };
  });
}

function fireStamp(){
  const stamp = document.getElementById('stampFx');
  if(!stamp) return;
  stamp.classList.remove('show');
  void stamp.offsetWidth;
  stamp.classList.add('show');
}

function tickClock(){
  const el = document.getElementById('liveClock');
  if(!el) return;
  const d = new Date();
  el.textContent = pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
}

(async function init(){
  await loadData();
  render();
  tickClock();
  setInterval(tickClock, 1000);
})();
</script>
</body>
</html>
